<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yaga Shop Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #faf8f4; --ink: #1c1a17; --ink2: #4a4740; --ink3: #8a8680;
  --rose: #c4614a; --sage: #4a6655; --border: #e8e4de; --card: #fff; --r: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

/* HEADER */
.hdr { background: var(--ink); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.brand { font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; text-decoration: none; }
.brand em { color: var(--rose); font-style: italic; }

/* URL BAR */
.urlbar { background: var(--ink); border-top: 1px solid rgba(255,255,255,0.07); padding: 1rem 2rem 1.25rem; }
.urlrow { max-width: 800px; margin: 0 auto; display: flex; gap: 8px; }
.urlinput {
  flex: 1; height: 42px; padding: 0 16px;
  border: 1.5px solid rgba(255,255,255,0.15); border-radius: 8px;
  background: rgba(255,255,255,0.06); color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.urlinput::placeholder { color: rgba(255,255,255,0.3); }
.urlinput:focus { border-color: var(--rose); }
.gobtn {
  height: 42px; padding: 0 20px; border: none; border-radius: 8px;
  background: var(--rose); color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: background 0.15s;
}
.gobtn:hover { background: #b5553f; }
.gobtn:disabled { background: #555; cursor: default; }
.urlhint { max-width: 800px; margin: 6px auto 0; font-size: 12px; color: rgba(255,255,255,0.3); }

/* PROGRESS */
.prog { background: var(--ink); padding: 0 2rem 1.25rem; display: none; }
.prog-track { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 7px; }
.prog-fill { height: 100%; background: var(--rose); width: 0%; transition: width 0.3s; }
.prog-label { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; }

/* SHOP INFO */
.shopinfo { display: none; background: var(--card); border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; }
.shopinfo-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.shopavatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border); flex-shrink: 0; background: #f0ede8; }
.shopname { font-size: 15px; font-weight: 500; }
.shopsub { font-size: 12px; color: var(--ink3); margin-top: 1px; }

/* STATS */
.statsbar { display: none; background: var(--card); border-bottom: 1px solid var(--border); }
.stats { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; flex-wrap: wrap; }
.stat { padding: 0.8rem 1.25rem 0.8rem 0; margin-right: 1.25rem; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.slabel { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.sval { font-size: 19px; font-weight: 500; }

/* TOOLBAR */
.toolbar { display: none; max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; gap: 8px; align-items: center; flex-wrap: wrap; }
.sw { flex: 1; min-width: 160px; position: relative; }
.sw svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--ink3); pointer-events: none; }
.sw input { width: 100%; height: 38px; padding: 0 11px 0 34px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--card); outline: none; }
.sw input:focus { border-color: var(--rose); }
.sw input::placeholder { color: var(--ink3); }
select.ss { height: 38px; padding: 0 11px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--card); outline: none; cursor: pointer; }
.vtog { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.vb { width: 38px; height: 38px; border: none; background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
.vb.on { background: var(--ink); color: #fff; }
.vb svg { width: 15px; height: 15px; }
.rc { font-size: 12px; color: var(--ink3); white-space: nowrap; }
.csvbtn { height: 38px; padding: 0 13px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink2); background: var(--card); cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.csvbtn:hover { border-color: var(--ink); }

/* MAIN */
.main { max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem 3rem; }

/* GRID */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.pc { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; text-decoration: none; color: inherit; display: block; transition: transform 0.15s, box-shadow 0.15s; }
.pc:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
.pc img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f0ede8; display: block; }
.pc-ph { width: 100%; aspect-ratio: 1; background: #f0ede8; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.pc-body { padding: 10px 12px 12px; }
.pc-brand { font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
.pc-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.4em; }
.pc-desc { font-size: 11px; color: var(--ink3); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 0; }
.pc-foot { display: flex; align-items: center; justify-content: space-between; }
.pr { font-size: 14px; font-weight: 500; }
.pr.free { color: var(--sage); }
.lk { font-size: 11px; color: var(--ink3); display: flex; align-items: center; gap: 3px; }
.lk svg { width: 11px; height: 11px; }

/* LIST */
.plist { display: flex; flex-direction: column; gap: 5px; }
.pl { background: var(--card); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; text-decoration: none; color: inherit; transition: background 0.1s; }
.pl:hover { background: #fdfcfa; }
.pl img { width: 56px; height: 56px; border-radius: 7px; object-fit: cover; flex-shrink: 0; background: #f0ede8; display: block; }
.pl-ph { width: 56px; height: 56px; border-radius: 7px; background: #f0ede8; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.pl-info { flex: 1; min-width: 0; }
.pl-title { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
.pl-desc { font-size: 12px; color: var(--ink3); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
.pl-sub { font-size: 11px; color: var(--ink3); }
.pl-right { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.pl-price { font-size: 14px; font-weight: 500; white-space: nowrap; }
.pl-price.free { color: var(--sage); }
.pl-lk { font-size: 11px; color: var(--ink3); display: flex; align-items: center; gap: 3px; }
.pl-lk svg { width: 11px; height: 11px; }

/* SKELETON */
.sgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
@keyframes sh { 0%{background-position:200% 0}100%{background-position:-200% 0} }
.sk { background: linear-gradient(90deg,#f0ede8 25%,#e5e0d8 50%,#f0ede8 75%); background-size: 200% 100%; animation: sh 1.5s infinite; }
.sk-c { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.sk-img { width: 100%; aspect-ratio: 1; }
.sk-bd { padding: 10px 12px 12px; }
.sk-ln { height: 11px; border-radius: 5px; margin-bottom: 7px; }
.sk-s { width: 55%; }

/* LANDING */
.landing { text-align: center; padding: 5rem 2rem 3rem; }
.landing h2 { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem,5vw,2.8rem); line-height: 1.15; margin-bottom: 0.75rem; }
.landing h2 em { color: var(--rose); font-style: italic; }
.landing p { color: var(--ink3); font-size: 15px; max-width: 400px; margin: 0 auto 1.5rem; line-height: 1.6; }
.eg { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.eg button { background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink2); cursor: pointer; }
.eg button:hover { border-color: var(--rose); color: var(--rose); }

.err { background: #fff0ee; border: 1px solid #f5c4b3; border-radius: 10px; padding: 1rem 1.25rem; color: #993c1d; font-size: 14px; line-height: 1.6; }
.err strong { display: block; margin-bottom: 3px; font-size: 15px; }
.empty { text-align: center; padding: 3rem; color: var(--ink3); font-size: 14px; }

@media (max-width: 640px) {
  .hdr, .urlbar, .shopinfo, .main { padding-left: 1rem; padding-right: 1rem; }
  .stats, .toolbar { padding-left: 1rem; padding-right: 1rem; }
  .stat { border-right: none; }
  .urlrow { flex-direction: column; }
}
</style>
</head>
<body>

<header class="hdr">
  <a class="brand" href="/" onclick="reset();return false;">Yaga <em>Shop</em> Browser</a>
</header>

<div class="urlbar">
  <div class="urlrow">
    <input class="urlinput" id="shopUrl" type="url"
      placeholder="https://www.yaga.co.za/craftyandbookish"
      onkeydown="if(event.key==='Enter')go()">
    <button class="gobtn" id="goBtn" onclick="go()">Browse shop</button>
  </div>
  <div class="urlhint">Works with any Yaga shop URL</div>
</div>

<div class="prog" id="prog">
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-label" id="progLabel">Starting...</div>
</div>

<div class="shopinfo" id="shopInfo">
  <div class="shopinfo-inner">
    <img class="shopavatar" id="shopAvatar" src="" alt="">
    <div>
      <div class="shopname" id="shopName"></div>
      <div class="shopsub" id="shopSub"></div>
    </div>
  </div>
</div>

<div class="statsbar" id="statsBar">
  <div class="stats">
    <div class="stat"><div class="slabel">Products</div><div class="sval" id="sN">—</div></div>
    <div class="stat"><div class="slabel">Total value</div><div class="sval" id="sV">—</div></div>
    <div class="stat"><div class="slabel">Avg price</div><div class="sval" id="sA">—</div></div>
    <div class="stat"><div class="slabel">Total likes</div><div class="sval" id="sL">—</div></div>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Search titles and descriptions..." oninput="render()">
  </div>
  <select class="ss" id="srt" onchange="render()">
    <option value="listedAt_desc">Newest first</option>
    <option value="listedAt_asc">Oldest first</option>
    <option value="price_asc">Price: low → high</option>
    <option value="price_desc">Price: high → low</option>
    <option value="likeCount_desc">Most liked</option>
    <option value="title_asc">Title A–Z</option>
  </select>
  <div class="vtog">
    <button class="vb on" id="gBtn" onclick="setView('grid')" title="Grid">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="vb" id="lBtn" onclick="setView('list')" title="List">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
  <span class="rc" id="rc"></span>
  <button class="csvbtn" onclick="exportCSV()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    CSV
  </button>
</div>

<main class="main" id="main">
  <div class="landing">
    <h2>Browse any<br><em>Yaga shop</em></h2>
    <p>Paste a shop URL above — every listing loads with full title, description, and images. Search across everything.</p>
    <div class="eg">
      <button onclick="loadShop('https://www.yaga.co.za/craftyandbookish')">craftyandbookish</button>
      <button onclick="loadShop('https://www.yaga.co.za/what-a-great-find')">what-a-great-find</button>
    </div>
  </div>
</main>

<script>
const LIMIT = 32;
const CONC = 10;
let products = [];
let slug = '';
let view = 'grid';
let busy = false;

// Extract Bearer token from Yaga's token cookie
function getYagaAuth() {
  const m = document.cookie.match(/(?:^|;\s*)token=([^;]+)/);
  if (m) return decodeURIComponent(m[1]); // returns "Bearer eyJ..."
  return '';
}

function authHeaders() {
  const auth = getYagaAuth();
  return auth ? { 'x-yaga-auth': auth } : {};
}

function px(url) {
  return fetch('/proxy?url=' + encodeURIComponent(url), { headers: authHeaders() })
    .then(r => { if (!r.ok) throw new Error('Proxy ' + r.status); return r.text(); });
}
function pxJson(url) {
  // Pass a unique cache-buster as a TOP-LEVEL proxy param so Netlify CDN sees a unique URL
  return fetch('/proxy?_=' + Date.now() + '&url=' + encodeURIComponent(url), { headers: authHeaders() })
    .then(r => { if (!r.ok) throw new Error('Proxy ' + r.status); return r.json(); });
}

// Decode HTML entities
function decodeHtml(s) {
  return (s || '')
    .replace(/&#x27;/g, "'").replace(/&#39;/g, "'")
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>').replace(/&quot;/g, '"')
    .replace(/&#x2F;/g, '/').replace(/&#x60;/g, '`');
}

// Extract title and description from product page raw HTML.
// Yaga is client-side rendered so __NEXT_DATA__ has no product data.
// The og: meta tags ARE server-rendered and contain everything we need:
//   og:image:alt  → "@shopslug - Product Title Here"
//   og:description → full description text
function extractFromHtml(html, shopSlug) {
  // 1. Title from og:image:alt — format is "@shopslug - Title"
  const altMatch = html.match(/property=["']og:image:alt["'][^>]+content=["']([^"']+)["']/i)
                || html.match(/content=["']([^"']+)["'][^>]+property=["']og:image:alt["']/i);
  let title = null;
  if (altMatch) {
    const raw = decodeHtml(altMatch[1]);
    // Strip the "@shopslug - " prefix
    const prefix = '@' + shopSlug + ' - ';
    title = raw.startsWith(prefix) ? raw.slice(prefix.length).trim() : raw.trim();
  }

  // 2. Full description from og:description
  // Content can span multiple lines and contain any characters except unescaped quotes
  const descMatch = html.match(/property=["']og:description["'][^>]+content=["']([\s\S]*?)["']\s*(?:data-next-head|\/?>)/i)
                 || html.match(/content=["']([\s\S]*?)["'][^>]+property=["']og:description["']/i);
  let description = null;
  if (descMatch) {
    description = decodeHtml(descMatch[1]).trim();
    // If description starts with the title, it IS just the description — keep it all
    if (!title && description) {
      // Use first line as title
      const lines = description.split('\n').map(s => s.trim()).filter(Boolean);
      title = lines[0] || null;
    }
  }

  // 3. Condition from og:description meta or page content
  const condMatch = html.match(/["']condition["']\s*:\s*["']([^"']+)["']/i);
  const condition = condMatch ? condMatch[1] : null;

  return { title, description, condition, category: null };
}

function setP(pct, label) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = label;
}

function skelGrid(n) {
  return `<div class="sgrid">${Array.from({length:Math.min(n,32)},()=>
    `<div class="sk-c"><div class="sk-img sk"></div><div class="sk-bd"><div class="sk-ln sk sk-s"></div><div class="sk-ln sk"></div><div class="sk-ln sk sk-s"></div></div></div>`
  ).join('')}</div>`;
}

async function batchMap(items, fn, conc, onProg) {
  const res = new Array(items.length);
  let idx = 0, done = 0;
  const worker = async () => {
    while (idx < items.length) {
      const i = idx++;
      res[i] = await fn(items[i], i);
      onProg && onProg(++done, items.length);
    }
  };
  await Promise.all(Array.from({length: Math.min(conc, items.length)}, worker));
  return res;
}

function loadShop(url) {
  document.getElementById('shopUrl').value = url;
  go();
}

function reset() {
  products = [];
  slug = '';
  document.getElementById('shopInfo').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('prog').style.display = 'none';
  document.getElementById('main').innerHTML = `<div class="landing">
    <h2>Browse any<br><em>Yaga shop</em></h2>
    <p>Paste a shop URL above — every listing loads with full title, description, and images.</p>
    <div class="eg">
      <button onclick="loadShop('https://www.yaga.co.za/craftyandbookish')">craftyandbookish</button>
      <button onclick="loadShop('https://www.yaga.co.za/what-a-great-find')">what-a-great-find</button>
    </div>
  </div>`;
}

async function go() {
  if (busy) return;
  let raw = document.getElementById('shopUrl').value.trim();
  if (!raw) return;
  if (!raw.startsWith('http')) raw = 'https://' + raw;
  raw = raw.replace(/\/$/, '');

  const m = raw.match(/yaga\.co\.za\/([^/?#]+)/);
  if (!m) { showErr('Not a valid Yaga shop URL. Example: https://www.yaga.co.za/craftyandbookish'); return; }
  slug = m[1];

  busy = true;
  document.getElementById('goBtn').disabled = true;
  document.getElementById('prog').style.display = 'block';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('shopInfo').style.display = 'none';
  products = [];
  setP(3, 'Connecting to Yaga...');

  try {
    setP(5, 'Loading shop...');

    // Get shopId from the shop page __NEXT_DATA__ initialProducts
    const shopHtml = await px(`https://www.yaga.co.za/${slug}`);
    const ndM = shopHtml.match(/"shopId"\s*:\s*(\d+)/);
    if (!ndM) throw new Error('Could not find shop. Check the URL.');
    const shopId = ndM[1];
    const totalM = shopHtml.match(/"total"\s*:\s*(\d+)/);
    const total = totalM ? parseInt(totalM[1]) : '?';

    setP(15, `Loading all ${total} products...`);
    document.getElementById('shopName').textContent = slug;
    document.getElementById('shopSub').textContent = `${total} products`;
    document.getElementById('shopInfo').style.display = 'block';
    document.getElementById('main').innerHTML = skelGrid(total || 32);

    // Fetch ALL products in one call
    const allData = await pxJson(`https://www.yaga.co.za/api/product/?shopId=${shopId}&status=published&offset=0&limit=3000`);
    if (!allData.data || !allData.data.list || allData.data.list.length === 0) {
      throw new Error('Could not load products.');
    }
    const stubs = allData.data.list;

    setP(30, `Got ${stubs.length} products — loading descriptions...`);
    products = stubs.map(s => ({ ...s, title: null, description: null, condition: null, category: null, _loaded: false }));

    // Render immediately so user sees all products now
    updateStats();
    document.getElementById('statsBar').style.display = 'block';
    document.getElementById('toolbar').style.display = 'flex';
    render();

    setP(30, `Loading descriptions for ${stubs.length} products...`);

    // Batch mode: send 20 slugs per function call — server fetches all in parallel and returns JSON
    // This means ~7 function calls for 129 products instead of 129 individual calls
    const BATCH = 20;
    let enriched = 0;
    for (let i = 0; i < products.length; i += BATCH) {
      const batch = products.slice(i, i + BATCH);
      const slugList = batch.map(p => p.slug).join(',');
      try {
        const results = await fetch(`/proxy?slugs=${encodeURIComponent(slugList)}&shop=${encodeURIComponent(slug)}`, { headers: authHeaders() })
          .then(r => r.json());
        // Map results back to products by slug
        const bySlug = {};
        results.forEach(r => { bySlug[r.slug] = r; });
        batch.forEach(prod => {
          const r = bySlug[prod.slug];
          if (r) {
            prod.title = r.title;
            prod.description = r.description;
          }
          prod._loaded = true;
        });
      } catch {
        batch.forEach(p => { p._loaded = true; });
      }
      enriched = Math.min(i + BATCH, products.length);
      setP(30 + Math.round((enriched / products.length) * 68), `Loading descriptions... ${enriched} / ${products.length}`);
      render();
    }

    setP(100, `All ${products.length} products loaded!`);
    setTimeout(() => { document.getElementById('prog').style.display = 'none'; }, 800);
    render();

  } catch (e) {
    setP(0, '');
    document.getElementById('prog').style.display = 'none';
    showErr(e.message);
    console.error(e);
  }
  busy = false;
  document.getElementById('goBtn').disabled = false;
}

function updateStats() {
  const priced = products.filter(p => p.price > 0);
  const tv = products.reduce((s, p) => s + p.price, 0);
  document.getElementById('sN').textContent = products.length;
  document.getElementById('sV').textContent = 'R' + tv.toLocaleString('en-ZA');
  document.getElementById('sA').textContent = priced.length ? 'R' + Math.round(tv / priced.length) : 'R0';
  document.getElementById('sL').textContent = products.reduce((s, p) => s + (p.likeCount || 0), 0);
}

function showErr(msg) {
  document.getElementById('main').innerHTML = `<div class="err"><strong>Could not load shop</strong>${msg}</div>`;
}

function setView(v) {
  view = v;
  document.getElementById('gBtn').classList.toggle('on', v === 'grid');
  document.getElementById('lBtn').classList.toggle('on', v === 'list');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const [sf, sd] = document.getElementById('srt').value.split('_');

  let list = products.filter(p => !q ||
    (p.title||'').toLowerCase().includes(q) ||
    (p.description||'').toLowerCase().includes(q) ||
    (p.brand||'').toLowerCase().includes(q) ||
    (p.category||'').toLowerCase().includes(q)
  );

  list.sort((a, b) => {
    let av = sf === 'listedAt' ? new Date(a[sf]) : sf === 'title' ? (a[sf]||a.slug||'').toLowerCase() : (a[sf]||0);
    let bv = sf === 'listedAt' ? new Date(b[sf]) : sf === 'title' ? (b[sf]||b.slug||'').toLowerCase() : (b[sf]||0);
    return sd === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  document.getElementById('rc').textContent = `${list.length} of ${products.length}`;
  const main = document.getElementById('main');
  if (!list.length) { main.innerHTML = '<div class="empty">No products match your search.</div>'; return; }
  main.innerHTML = view === 'grid'
    ? `<div class="pgrid">${list.map(cardH).join('')}</div>`
    : `<div class="plist">${list.map(listH).join('')}</div>`;
}

const hrt = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cardH(p) {
  const url = `https://www.yaga.co.za/${slug}/product/${p.slug}`;
  const img = p.images?.[0]?.thumbnail || '';
  const title = p.title || (p._loaded ? '(no title)' : '');
  // Show first line of description as subtitle
  const descLine = p.description ? p.description.split('\n')[0].trim() : (!p._loaded ? 'Loading...' : '');
  const imgEl = img ? `<img src="${esc(img)}" alt="${esc(title)}" loading="lazy">` : `<div class="pc-ph">🛍️</div>`;
  const prEl = p.price === 0 ? `<span class="pr free">Free</span>` : `<span class="pr">R${p.price}</span>`;
  return `<a class="pc" href="${url}" target="_blank" rel="noopener">
    ${imgEl}
    <div class="pc-body">
      ${p.brand ? `<div class="pc-brand">${esc(p.brand)}</div>` : ''}
      <div class="pc-title" style="${!title ? 'background:#f0ede8;height:11px;border-radius:4px;margin-bottom:6px' : ''}">${esc(title)}</div>
      ${descLine ? `<div class="pc-desc" style="${!p._loaded ? 'color:#bbb' : ''}">${esc(descLine)}</div>` : ''}
      <div class="pc-foot">${prEl}<span class="lk">${hrt}${p.likeCount||0}</span></div>
    </div>
  </a>`;
}

function listH(p) {
  const url = `https://www.yaga.co.za/${slug}/product/${p.slug}`;
  const img = p.images?.[0]?.thumbnail || '';
  const title = p.title || (p._loaded ? '(no title)' : '');
  const desc = p.description ? p.description.replace(/\n+/g, ' ').trim() : (!p._loaded ? 'Loading description...' : '');
  const date = p.listedAt ? new Date(p.listedAt).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : '';
  const imgEl = img ? `<img src="${esc(img)}" alt="" loading="lazy">` : `<div class="pl-ph">🛍️</div>`;
  const prEl = p.price === 0 ? `<span class="pl-price free">Free</span>` : `<span class="pl-price">R${p.price}</span>`;
  return `<a class="pl" href="${url}" target="_blank" rel="noopener">
    ${imgEl}
    <div class="pl-info">
      <div class="pl-title" style="${!title ? 'background:#f0ede8;height:11px;border-radius:4px;width:70%' : ''}">${esc(title)}</div>
      ${desc ? `<div class="pl-desc" style="${!p._loaded ? 'color:#bbb' : ''}">${esc(desc)}</div>` : ''}
      <div class="pl-sub">${p.brand ? esc(p.brand)+' · ' : ''}${date}${p.condition ? ' · '+esc(p.condition) : ''}</div>
    </div>
    <div class="pl-right">
      ${prEl}
      <span class="pl-lk">${hrt}${p.likeCount||0}</span>
    </div>
  </a>`;
}

function exportCSV() {
  const rows = [['Title','Description','Price','Likes','Brand','Category','Condition','Listed','URL']];
  products.forEach(p => rows.push([
    `"${(p.title||p.slug||'').replace(/"/g,'""')}"`,
    `"${(p.description||'').replace(/\n/g,' ').replace(/"/g,'""')}"`,
    p.price, p.likeCount||0,
    `"${(p.brand||'').replace(/"/g,'""')}"`,
    `"${(p.category||'').replace(/"/g,'""')}"`,
    `"${(p.condition||'').replace(/"/g,'""')}"`,
    p.listedAt ? new Date(p.listedAt).toLocaleDateString('en-ZA') : '',
    `https://www.yaga.co.za/${slug}/product/${p.slug}`
  ]));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));
  a.download = `${slug}.csv`;
  a.click();
}
</script>
